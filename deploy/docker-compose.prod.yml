version: "3.9"

services:
  # ==================== 基础设施 ====================
  db:
    image: postgres:16
    container_name: deskpet-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: deskpet
    ports:
      - "5432:5432"
    volumes:
      - deskpet-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - deskpet-internal

  tsdb:
    image: timescale/timescaledb:latest-pg16
    container_name: deskpet-tsdb
    environment:
      POSTGRES_USER: deskpet
      POSTGRES_PASSWORD: deskpet
      POSTGRES_DB: deskpet_ts
    ports:
      - "5433:5432"
    volumes:
      - deskpet-tsdb-data:/var/lib/postgresql/data
      - ./timescaledb-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TSDB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - deskpet-internal

  redis:
    image: redis:7
    container_name: deskpet-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - deskpet-internal

  # ==================== 后端服务 ====================
  pet-core:
    image: ${REGISTRY:-}deskpet/pet-core:${TAG:-latest}
    container_name: deskpet-core
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TSDB_ENABLED: ${TSDB_ENABLED}
      TSDB_URL: ${TSDB_URL}
      TSDB_USER: ${TSDB_USER}
      TSDB_PASSWORD: ${TSDB_PASSWORD}
      TSDB_LOG_LEVEL: ${TSDB_LOG_LEVEL}
      SNOWFLAKE_WORKER_ID: ${SNOWFLAKE_WORKER_ID}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      tsdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - deskpet-internal

  mqtt-gateway:
    image: ${REGISTRY:-}deskpet/mqtt-gateway:${TAG:-latest}
    container_name: deskpet-gateway
    volumes:
      - ./gateway-config.yaml:/app/config.yaml:ro
    ports:
      - "1883:1883"
      - "8081:8081"
    depends_on:
      pet-core:
        condition: service_started
    restart: unless-stopped
    networks:
      - deskpet-internal

