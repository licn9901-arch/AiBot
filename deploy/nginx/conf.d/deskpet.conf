# 上游服务定义（Docker 容器绑定到 127.0.0.1）
upstream pet_core {
    server 127.0.0.1:8080;
}

upstream pet_ai {
    server 127.0.0.1:8090;
}

# ==================== 用户前端 ====================
server {
    listen 80;
    server_name pet.yourdomain.com;

    # 如需 HTTPS，取消以下注释并注释掉上面的 listen 80
    # listen 443 ssl http2;
    # ssl_certificate /etc/nginx/ssl/pet.yourdomain.com.pem;
    # ssl_certificate_key /etc/nginx/ssl/pet.yourdomain.com.key;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # 前端静态资源
    root /var/www/deskpet/user-frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 后端 API
    location /api/ {
        proxy_pass http://pet_core/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket
    location /ws {
        proxy_pass http://pet_core/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}

