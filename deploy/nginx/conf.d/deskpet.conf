# ==================== API 直接访问（可选） ====================
server {
    listen 80;
    server_name api.yourdomain.com;

    # listen 443 ssl http2;
    # ssl_certificate /etc/nginx/ssl/api.yourdomain.com.pem;
    # ssl_certificate_key /etc/nginx/ssl/api.yourdomain.com.key;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # pet-core API
    location / {
        proxy_pass http://pet_core;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # pet-ai API
    location /ai/ {
        proxy_pass http://pet_ai/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws {
        proxy_pass http://pet_core/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # 健康检查
    location /health {
        proxy_pass http://pet_core/actuator/health;
    }
}

