server:
  port: 8080

spring:
  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=deskpet&stringtype=unspecified}"
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres123}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  # Redis 配置（用于 Sa-Token 分布式会话）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:localhost8080}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.transport.protocol: smtp
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:5000}

# Sa-Token 配置
sa-token:
  # Token 名称（同时也是 Cookie 名称、Header 名称）
  token-name: Authorization
  # Token 有效期（单位：秒），默认1天
  timeout: 86400
  # Token 临时有效期（指定时间内无操作就视为过期），-1 代表不限制
  active-timeout: -1
  # 是否允许同一账号并发登录
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 Token
  is-share: false
  # Token 风格
  token-style: uuid
  # 是否输出操作日志
  is-log: false
  # 是否从 Header 读取 Token
  is-read-header: true
  # 是否从 Cookie 读取 Token
  is-read-cookie: false
  # Token 前缀（如 Bearer）
  token-prefix: Bearer

command:
  timeoutSec: 10
  timeoutScanMs: 2000

gateway:
  baseUrl: http://mqtt-gateway:8081

auth:
  frontend-base-url: ${AUTH_FRONTEND_BASE_URL:http://localhost:5174}
  mail-from: ${AUTH_MAIL_FROM:${MAIL_USERNAME:cubee_ai@foxmail.com}}
  activation-token-ttl: ${AUTH_ACTIVATION_TOKEN_TTL:24h}
  password-reset-token-ttl: ${AUTH_PASSWORD_RESET_TOKEN_TTL:30m}

cos:
  bucket: ${COS_BUCKET:}
  region: ${COS_REGION:}
  secret-id: ${COS_SECRET_ID:}
  secret-key: ${COS_SECRET_KEY:}
  session-token: ${COS_SESSION_TOKEN:}
  custom-domain: ${COS_CUSTOM_DOMAIN:}
  base-path: ${COS_BASE_PATH:cubee}
  use-https: ${COS_USE_HTTPS:true}
  default-sign-duration: ${COS_DEFAULT_SIGN_DURATION:15m}
  connection-timeout-millis: ${COS_CONNECTION_TIMEOUT_MILLIS:30000}
  socket-timeout-millis: ${COS_SOCKET_TIMEOUT_MILLIS:30000}

internal:
  token: ${INTERNAL_TOKEN:cubee}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# TimescaleDB 时序库配置
timescaledb:
  enabled: ${TSDB_ENABLED:true}
  datasource:
    url: ${TSDB_URL:jdbc:postgresql://localhost:5433/deskpet_ts}
    username: ${TSDB_USER}
    password: ${TSDB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  # Logback Appender 日志录入级别：WARN / INFO / DEBUG
  log-level: ${TSDB_LOG_LEVEL:INFO}

# Snowflake 分布式 ID 配置
snowflake:
  worker-id: ${SNOWFLAKE_WORKER_ID:0}
